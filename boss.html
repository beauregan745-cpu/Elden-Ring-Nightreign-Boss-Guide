<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nightreign Boss Guide</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<header>
<h1>ELDEN RING: NIGHTREIGN</h1>
<p>Boss Strategy Compendium</p>
</header>

<section class="boss-grid">

<div class="boss-card">

<img src="images/dreglord.jpg">

<h2>Dreglord</h2>

<p>Ancient tyrant risen from the abyss.</p>

<button onclick="openBoss('dreglord')">View Guide</button>

</div>


<div class="boss-card">

<img src="images/balancers.jpg">

<h2>The Balancers</h2>

<p>Keepers of the fractured order.</p>

<button onclick="openBoss('balancers')">View Guide</button>

</div>

</section>


<section id="boss-guide" class="guide hidden">

<h2 id="boss-name"></h2>

<div class="guide-buttons">

<button onclick="showNormal()">Normal</button>
<button onclick="showEverdark()">Everdark</button>

</div>

<div id="normal">

<h3>Weaknesses</h3>

<ul id="weaknesses"></ul>

<h3>Recommended Weapons</h3>

<ul id="weapons"></ul>

</div>


<div id="everdark" class="hidden">

<h3>Everdark Variant</h3>

<p>Stronger, faster attacks and shadow abilities.</p>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
